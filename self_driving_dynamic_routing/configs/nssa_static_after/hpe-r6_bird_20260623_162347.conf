router id 6.6.6.6;

log stderr all;

protocol device {
}

protocol direct {
    ipv4;
}

protocol kernel {
    ipv4 {
        import all;
        export all;
    };
}

protocol bfd {
}

protocol ospf ospf1 {
    ipv4 {
        import all;
        export filter {
            if net = 172.16.66.0/24 then {
                ospf_metric2 = 66;
                accept;
            }
            reject;
        };
    };


    area 10 {
        stubnet 10.0.61.0/24;
        nssa;

        interface "eth1" {
            hello 5;
            bfd yes;
        };

        interface "eth0" {
            stub yes;
            bfd yes;
        };

        interface "lo" {
            stub;
        };
    };
}

protocol static nssa_test_static {
    ipv4;
    route 172.16.66.0/24 blackhole;
}
