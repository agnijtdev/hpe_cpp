# =============================================================================
# replica-a/nsd.conf
# Authoritative DNS server config. Listens on the anycast address
# 192.0.2.1 (bound to lo) so it only answers once that route is announced
# locally and reachable.
# =============================================================================
server:
    server-count: 1
    verbosity: 1
    hide-version: yes

    # Bind explicitly to the anycast IP and the container's own bridge IP,
    # so health checks via 10.10.0.3 still work even if 192.0.2.1 is
    # temporarily withdrawn from BIRD (kept up on lo regardless).
    ip-address: 192.0.2.1
    ip-address: 10.10.0.3

    username: root
    zonesdir: "/etc/nsd/zones"
    pidfile: "/var/run/nsd.pid"
    logfile: "/var/log/nsd/nsd.log"

zone:
    name: "bgpost.lab"
    zonefile: "/etc/nsd/zones/bgpost.lab.zone"