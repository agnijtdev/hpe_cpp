# =============================================================================
# replica-a/bird.conf
# -----------------------------------------------------------------------------
# Role: anycast service replica A. Advertises 192.0.2.1/32 (the anycast
#       service address, bound to lo) towards the provider over BGPoTLS.
#       The route is withdrawn automatically by the healthcheck script if
#       the local NSD instance dies.
# =============================================================================

router id 10.10.0.3;
log syslog all;
log "/var/log/bird/bird.log" all;

protocol device {
}

protocol direct {
    ipv4;
}

protocol kernel {
    ipv4 {
        export none;
        import none;
    };
    learn off;
}

# The anycast prefix. It is bound to lo by entrypoint.sh BEFORE bird starts,
# so this 'static' route always exists in BIRD's table -- whether or not it
# actually gets ADVERTISED to the provider is controlled by enabling /
# disabling this protocol, which the healthcheck script toggles via
# 'birdc disable/enable'.
protocol static anycast_route {
    ipv4 { export all; };
    route 192.0.2.1/32 via "lo";
}

# Export filter: only advertise routes that originated from a static
# protocol (i.e. our anycast_route), regardless of the protocol's name.
filter export_anycast {
    if source = RTS_STATIC then accept;
    reject;
}

# ---------------------------------------------------------------------------
# BGPoTLS session towards the provider
# ---------------------------------------------------------------------------
protocol bgp provider {
    local 10.10.0.3 as 65010;
    neighbor 10.10.0.2 as 65000;

    advertise hostname off;

    transport tls;
    tls certificate "/certs/replica-a.crt";
    tls pkey        "/certs/replica-a.key";
    tls root ca     "/certs/ca.crt";
    tls local sni   "replica-a.bgpost.lab";
    tls peer sni    "provider.bgpost.lab";

   ipv4 {
    import none;
    export all;
};
}