# =============================================================================
# replica-b/nsd.conf
# Same role as replica-a/nsd.conf, bound to replica B's bridge IP instead.
# =============================================================================
server:
    server-count: 1
    verbosity: 1
    hide-version: yes

    ip-address: 192.0.2.1
    ip-address: 10.10.0.4

    username: root
    zonesdir: "/etc/nsd/zones"
    pidfile: "/var/run/nsd.pid"
    logfile: "/var/log/nsd/nsd.log"

zone:
    name: "bgpost.lab"
    zonefile: "/etc/nsd/zones/bgpost.lab.zone"