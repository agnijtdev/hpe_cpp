# =============================================================================
# provider-router/bird.conf
# -----------------------------------------------------------------------------
# Role: upstream provider. Accepts eBGP-over-TLS sessions from both anycast
#       replicas and installs the routes they advertise (192.0.2.1/32) into
#       its FIB. This is the router the client-node will route through.
#
# IP plan (all IPv4, single /24 docker bridge 10.10.0.0/24):
#   provider-router    10.10.0.2   AS 65000
#   anycast-replica-a  10.10.0.3   AS 65010
#   anycast-replica-b  10.10.0.4   AS 65011
#   client-node        10.10.0.5   (no BGP, just a routed client)
# =============================================================================

router id 10.10.0.2;
log syslog all;
log "/var/log/bird/bird.log" all;

protocol device {
}

# Re-export directly connected interfaces (mostly for diagnostics).
protocol direct {
    ipv4;
}

# Install BGP-learned routes into the Linux kernel routing table so that
# traffic to 192.0.2.1 actually gets forwarded out the right interface.
protocol kernel {
    ipv4 {
        export all;
        import none;
    };
    learn off;
}

# Static placeholder route, mirrors the structure shown in the paper's
# config examples (a blackhole route for the provider's own aggregate).
protocol static {
    ipv4 { export all; };
    route 198.51.100.0/24 blackhole;
}

# ---------------------------------------------------------------------------
# BGPoTLS session with anycast-replica-a
# ---------------------------------------------------------------------------
protocol bgp replica_a {
    local 10.10.0.2 as 65000;
    neighbor 10.10.0.3 as 65010;

    advertise hostname off;

    transport tls;
    tls certificate "/certs/provider.crt";
    tls pkey        "/certs/provider.key";
    tls root ca     "/certs/ca.crt";
    tls local sni   "provider.bgpost.lab";
    tls peer sni    "replica-a.bgpost.lab";

    ipv4 {
        import all;   # accept the anycast prefix from replica A
        export none;  # provider does not push routes back to the replica
    };
}

# ---------------------------------------------------------------------------
# BGPoTLS session with anycast-replica-b
# ---------------------------------------------------------------------------
protocol bgp replica_b {
    local 10.10.0.2 as 65000;
    neighbor 10.10.0.4 as 65011;

    advertise hostname off;

    transport tls;
    tls certificate "/certs/provider.crt";
    tls pkey        "/certs/provider.key";
    tls root ca     "/certs/ca.crt";
    tls local sni   "provider.bgpost.lab";
    tls peer sni    "replica-b.bgpost.lab";

    ipv4 {
        import all;
        export none;
    };
}