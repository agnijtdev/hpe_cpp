router id 8.8.8.8;

log stderr all;

protocol device {
}

protocol direct {
    ipv4;
}

protocol kernel {
    ipv4 {
        import all;
        export all;
    };
}


protocol bfd {
    multihop {
        interval 100 ms;
        multiplier 5;
    };

    neighbor 10.0.14.2 local 10.0.82.3 multihop;
}

protocol ospf ospf1 {

    area 20 {
        stubnet 10.0.82.0/24;
        stub;

        interface "eth1" {
            hello 5;
            bfd yes;
        };

        interface "eth0" {
            stub yes;
            bfd yes;
        };

        interface "lo" {
            stub;
        };
    };
}
