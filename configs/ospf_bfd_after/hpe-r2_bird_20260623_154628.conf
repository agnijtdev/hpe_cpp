router id 2.2.2.2;

log stderr all;

protocol device {
}

protocol direct {
    ipv4;
}

protocol kernel {
    ipv4 {
        import all;
        export all;
    };
}

protocol bfd{
}

protocol ospf ospf1 {
    ipv4 {
        import all;

        # Export only the default route into OSPF.
        # This makes r1/r2 act as WAN exit routers for the OSPF domain.
        export filter {
            if net = 0.0.0.0/0 then {
                ospf_metric2 = 10;
                accept;
            }
            reject;
        };
    };

    area 0 {

        interface "eth2" {
            hello 5;
            bfd yes;
        };

        interface "eth3" {
            hello 5;
            bfd yes;
        };

        interface "eth0" {
            hello 5;
            bfd yes;
        };

        interface "lo" {
            stub;
        };
    };
}

protocol bgp r9 {

    local as 65001;

    neighbor 10.0.29.3 as 65002;

    bfd yes;

    graceful restart yes;
    long lived graceful restart yes;



    ipv4 {
        import all;
        export all;
    };
}

protocol bgp r1 {

    local as 65001;

    neighbor 10.0.12.2 as 65001;

    graceful restart yes;
    long lived graceful restart yes;

    ipv4 {
        import all;
        export all;
        next hop self;
    };
}

# Default route toward ISP/upstream router hpe-r9.
# This provides a second WAN-edge default path for redundancy.
protocol static default_to_isp {
    ipv4;
    route 0.0.0.0/0 via 10.0.29.3;
}
